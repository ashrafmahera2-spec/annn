    <script>
      function initAdminWysiwyg() {
        if (!window.tinymce) return;
        document.querySelectorAll('textarea[data-tinymce="true"]').forEach((textarea) => {
          const id = textarea.id;
          if (!id) return;

          const existingEditor = window.tinymce.get(id);
          if (existingEditor) {
            if (!document.body.contains(existingEditor.targetElm) || existingEditor.targetElm !== textarea) {
              window.tinymce.remove(existingEditor);
            } else {
              const currentHtml = existingEditor.getContent({ format: 'html' }) || '';
              if (textarea.value !== currentHtml) {
                existingEditor.setContent(textarea.value || '');
              }
              return;
            }
          }

          window.tinymce.init({
            selector: `#${id}`,
            plugins: 'advlist autolink lists link image media code',
            toolbar: 'undo redo | formatselect | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image media | code',
            menubar: false,
            branding: false,
            height: 360,
            media_live_embeds: true,
            image_title: true,
            automatic_uploads: true,
            images_upload_url: '/php-api/api.php?action=upload',
            images_upload_credentials: true,
            file_picker_types: 'image',
            file_picker_callback: function(callback, value, meta) {
              if (meta.filetype !== 'image') return;
              const input = document.createElement('input');
              input.setAttribute('type', 'file');
              input.setAttribute('accept', 'image/*');
              input.addEventListener('change', () => {
                const file = input.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('file', file);
                fetch('/php-api/api.php?action=upload', {
                  method: 'POST',
                  body: formData,
                })
                  .then((response) => response.json())
                  .then((data) => {
                    if (data.location) {
                      callback(data.location, { alt: file.name });
                    } else {
                      alert(data.error || 'فشل رفع الصورة');
                    }
                  })
                  .catch(() => {
                    alert('حدث خطأ أثناء رفع الصورة. حاول مرة أخرى.');
                  });
              });
              input.click();
            },
            content_style: 'body { font-family: Cairo, sans-serif; font-size: 16px; }',
            setup(editor) {
              editor.on('change', () => editor.save());
            },
          });
        });
      }
      window.addEventListener('load', () => {
        initAdminWysiwyg();
        const observer = new MutationObserver(() => initAdminWysiwyg());
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
